    <rect x="80" y="-11" width="40" height="14" rx="3" fill="rgba(99,102,241,0.15)"/>
    <text x="100" y="0" fill="#6366f1" font="700 10px Inter" text-anchor="middle">INFO</text>
    <text x="132" y="0" fill="#f1f5f9">Initializing security scanner agent...</text>

    <text class="ts" x="0" y="28">22:14:03</text>
    <rect x="80" y="17" width="40" height="14" rx="3" fill="rgba(99,102,241,0.15)"/>
    <text x="100" y="28" fill="#6366f1" font="700 10px Inter" text-anchor="middle">INFO</text>
    <text x="132" y="28" fill="#f1f5f9">Loading vulnerability databases (NVD, GHSA, OSV)...</text>

    <text class="ts" x="0" y="56">22:14:04</text>
    <rect x="80" y="45" width="40" height="14" rx="3" fill="rgba(148,163,184,0.1)"/>
    <text x="100" y="56" fill="#94a3b8" font="700 10px Inter" text-anchor="middle">DEBUG</text>
    <text x="132" y="56" fill="#94a3b8">Database version: 2026.04.28</text>

    <text class="ts" x="0" y="84">22:14:04</text>
    <rect x="80" y="73" width="40" height="14" rx="3" fill="rgba(99,102,241,0.15)"/>
    <text x="100" y="84" fill="#6366f1" font="700 10px Inter" text-anchor="middle">INFO</text>
    <text x="132" y="84" fill="#f1f5f9">Phase 1: Dependency vulnerability scan...</text>

    <text class="ts" x="0" y="112">22:14:05</text>
    <rect x="80" y="101" width="40" height="14" rx="3" fill="rgba(148,163,184,0.1)"/>
    <text x="100" y="112" fill="#94a3b8" font="700 10px Inter" text-anchor="middle">DEBUG</text>
    <text x="132" y="112" fill="#94a3b8">Scanning 145 direct dependencies...</text>

    <text class="ts" x="0" y="140">22:14:06</text>
    <rect x="80" y="129" width="40" height="14" rx="3" fill="rgba(245,158,11,0.15)"/>
    <text x="100" y="140" fill="#f59e0b" font="700 10px Inter" text-anchor="middle">WARN</text>
    <text x="132" y="140" fill="#f59e0b">CVE-2026-1234: lodash@4.17.20 — Prototype pollution (Medium)</text>

    <text class="ts" x="0" y="168">22:14:07</text>
    <rect x="80" y="157" width="40" height="14" rx="3" fill="rgba(245,158,11,0.15)"/>
    <text x="100" y="168" fill="#f59e0b" font="700 10px Inter" text-anchor="middle">WARN</text>
    <text x="132" y="168" fill="#f59e0b">CVE-2026-5678: axios@0.27.2 — SSRF vulnerability (High)</text>

    <text class="ts" x="0" y="196">22:14:08</text>
    <rect x="80" y="185" width="40" height="14" rx="3" fill="rgba(99,102,241,0.15)"/>
    <text x="100" y="196" fill="#6366f1" font="700 10px Inter" text-anchor="middle">INFO</text>
    <text x="132" y="196" fill="#f1f5f9">Phase 2: Static code analysis...</text>

    <text class="ts" x="0" y="224">22:14:08</text>
    <rect x="80" y="213" width="40" height="14" rx="3" fill="rgba(148,163,184,0.1)"/>
    <text x="100" y="224" fill="#94a3b8" font="700 10px Inter" text-anchor="middle">DEBUG</text>
    <text x="132" y="224" fill="#94a3b8">Analyzing 847 files for security patterns...</text>

    <text class="ts" x="0" y="252">22:14:09</text>
    <rect x="80" y="241" width="40" height="14" rx="3" fill="rgba(245,158,11,0.15)"/>
    <text x="100" y="252" fill="#f59e0b" font="700 10px Inter" text-anchor="middle">WARN</text>
    <text x="132" y="252" fill="#f59e0b">Potential SQL injection in src/db/queries.ts:45</text>

    <text class="ts" x="0" y="280">22:14:10</text>
    <rect x="80" y="269" width="40" height="14" rx="3" fill="rgba(99,102,241,0.15)"/>
    <text x="100" y="280" fill="#6366f1" font="700 10px Inter" text-anchor="middle">INFO</text>
    <text x="132" y="280" fill="#f1f5f9">Phase 3: Secrets detection...</text>

    <text class="ts" x="0" y="308">22:14:11</text>
    <rect x="80" y="297" width="40" height="14" rx="3" fill="rgba(148,163,184,0.1)"/>
    <text x="100" y="308" fill="#94a3b8" font="700 10px Inter" text-anchor="middle">DEBUG</text>
    <text x="132" y="308" fill="#94a3b8">Scanning for exposed API keys, tokens, and credentials...</text>

    <text class="ts" x="0" y="336">22:14:12</text>
    <rect x="80" y="325" width="40" height="14" rx="3" fill="rgba(239,68,68,0.15)"/>
    <text x="100" y="336" fill="#ef4444" font="700 10px Inter" text-anchor="middle">ERROR</text>
    <text x="132" y="336" fill="#ef4444">🚨 Exposed API key detected in src/config/dev.env (line 12)</text>

    <rect x="132" y="358" width="8" height="13" fill="#6366f1"/>
  </g>

  <!-- Sidebar -->
  <!-- Meta tiles -->
  <rect class="panel" x="976" y="244" width="416" height="100" rx="12"/>
  <text class="label" x="1000" y="276">DURATION</text>
  <text class="text-mono-light" x="1000" y="316" style="font-size:18px">0:09</text>
  <line x1="1124" y1="262" x2="1124" y2="326" stroke="rgba(148,163,184,0.1)"/>
  <text class="label" x="1144" y="276">TOKENS</text>
  <text class="text-mono-light" x="1144" y="316" style="font-size:18px">3,247</text>
  <line x1="1268" y1="262" x2="1268" y2="326" stroke="rgba(148,163,184,0.1)"/>
  <text class="label" x="1288" y="276">LOGS</text>
  <text class="text-mono-light" x="1288" y="316" style="font-size:18px">14</text>

