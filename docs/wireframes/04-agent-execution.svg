  <g transform="translate(1000,412)" font="500 13px Inter">
    <!-- Step 1 success -->
    <circle cx="11" cy="20" r="11" fill="#10b981"/>
    <text x="11" y="24" fill="white" font="700 11px Inter" text-anchor="middle">✓</text>
    <text x="34" y="24" fill="#94a3b8">Initialize</text>

    <!-- Step 2 success -->
    <circle cx="11" cy="56" r="11" fill="#10b981"/>
    <text x="11" y="60" fill="white" font="700 11px Inter" text-anchor="middle">✓</text>
    <text x="34" y="60" fill="#94a3b8">Dependency Scan</text>

    <!-- Step 3 running -->
    <rect x="-8" y="76" width="380" height="28" rx="6" fill="rgba(99,102,241,0.15)"/>
    <circle cx="11" cy="92" r="11" fill="#6366f1"/>
    <circle cx="11" cy="92" r="5" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="34" y="96" fill="#f1f5f9" font="500 13px Inter">Static Analysis</text>

    <!-- Step 4 pending -->
    <circle cx="11" cy="128" r="11" fill="#1a2440" stroke="rgba(148,163,184,0.2)"/>
    <text x="11" y="132" fill="#64748b" font="700 11px Inter" text-anchor="middle">4</text>
    <text x="34" y="132" fill="#64748b">Secrets Detection</text>

    <!-- Step 5 pending -->
    <circle cx="11" cy="164" r="11" fill="#1a2440" stroke="rgba(148,163,184,0.2)"/>
    <text x="11" y="168" fill="#64748b" font="700 11px Inter" text-anchor="middle">5</text>
    <text x="34" y="168" fill="#64748b">Generate Report</text>
  </g>

  <!-- Failure banner placeholder (showing both states) -->
  <rect x="976" y="656" width="416" height="100" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)"/>
  <text x="1000" y="688" fill="#ef4444" font="600 14px Inter">Retry available on failure</text>
  <text x="1000" y="710" fill="#94a3b8" font="500 12px Inter">If the agent reports an error, a retry</text>
  <text x="1000" y="728" fill="#94a3b8" font="500 12px Inter">button appears here with full context.</text>
  <rect x="1000" y="740" width="100" height="0" rx="8" fill="#6366f1"/>

  <!-- Success banner alt placeholder -->
  <rect x="976" y="772" width="416" height="80" rx="12" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.3)"/>
  <circle cx="1014" cy="812" r="18" fill="#10b981"/>
  <text x="1014" y="817" fill="white" font="700 16px Inter" text-anchor="middle">✓</text>
  <text x="1042" y="808" fill="#f1f5f9" font="600 14px Inter">Task complete (on success)</text>
  <text x="1042" y="828" fill="#94a3b8" font="500 12px Inter">Finished in 0:09 · 3,247 tokens</text>

  <text class="text-body" x="48" y="884" style="font-size:11px;font-style:italic">Wireframe 4 of 4 — Agent Execution · Streaming logs (left), reasoning steps + meta + status (right). Color-coded log levels, animated step indicator, retry on failure.</text>
</svg>
