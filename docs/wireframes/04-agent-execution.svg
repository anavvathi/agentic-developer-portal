<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <style>
      .bg { fill: #060a14; }
      .panel { fill: #0c1222; stroke: rgba(148,163,184,0.1); stroke-width: 1; }
      .panel-deep { fill: #0c1222; stroke: rgba(148,163,184,0.1); stroke-width: 1; }
      .panel-elev { fill: #141c2e; stroke: rgba(148,163,184,0.1); stroke-width: 1; }
      .text-h2 { fill: #f1f5f9; font: 700 22px Inter, sans-serif; }
      .text-body { fill: #94a3b8; font: 400 13px Inter, sans-serif; }
      .text-mono { fill: #94a3b8; font: 500 12px 'JetBrains Mono', monospace; }
      .text-mono-light { fill: #f1f5f9; font: 500 12px 'JetBrains Mono', monospace; }
      .label { fill: #64748b; font: 600 11px Inter, sans-serif; letter-spacing: 0.5px; }
      .ts { fill: #64748b; font: 500 11px 'JetBrains Mono', monospace; }
      .accent { fill: #6366f1; }
      .ghost { fill: #94a3b8; font: 500 13px Inter; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="900"/>

  <!-- Header -->
  <rect class="panel" x="0" y="0" width="1440" height="68"/>
  <rect class="accent" x="48" y="20" width="32" height="32" rx="8"/>
  <text fill="#f1f5f9" font="700 15px Inter" x="92" y="36">Agentic Portal</text>
  <text class="text-body" x="92" y="54" style="font-size:11px">AI-native developer platform</text>
  <text class="text-body" x="280" y="42">Repositories</text>
  <text fill="#64748b" x="365" y="42">/</text>
  <text fill="#94a3b8" font="500 13px Inter" x="378" y="42">developer-portal-ui</text>
  <text fill="#64748b" x="510" y="42">/</text>
  <text fill="#f1f5f9" font="500 13px Inter" x="522" y="42">Agent Execution</text>

  <text class="ghost" x="48" y="106">← Back to developer-portal-ui</text>

  <!-- Execution header -->
  <rect class="panel" x="48" y="124" width="1344" height="100" rx="16"/>
  <rect x="72" y="148" width="56" height="56" rx="10" fill="#f59e0b" opacity="0.7"/>
  <text x="100" y="188" font="28px sans-serif" text-anchor="middle">🛡️</text>
  <text class="text-h2" x="148" y="170">Security Scan</text>
  <text class="text-body" x="148" y="194">on <tspan fill="#f1f5f9" font="600 13px Inter">developer-portal-ui</tspan> · 2-4 min</text>

  <!-- Status badge -->
  <rect x="1024" y="160" width="118" height="32" rx="16" fill="rgba(99,102,241,0.25)" stroke="#6366f1"/>
  <circle cx="1042" cy="176" r="5" fill="#6366f1"/>
  <text x="1056" y="180" fill="#6366f1" font="700 11px Inter" letter-spacing="0.5px">◐ RUNNING</text>

  <rect class="panel-elev" x="1156" y="160" width="80" height="32" rx="10"/>
  <text x="1196" y="180" fill="#f1f5f9" font="500 13px Inter" text-anchor="middle">Details</text>
  <text class="ghost" x="1252" y="180">Switch task</text>

  <!-- Logs panel (left, large) -->
  <rect class="panel-deep" x="48" y="244" width="900" height="612" rx="16"/>
  <!-- Log header -->
  <rect fill="#141c2e" x="48" y="244" width="900" height="48" rx="16"/>
  <rect fill="#141c2e" x="48" y="276" width="900" height="16"/>
  <text class="label" x="72" y="274">LIVE LOGS</text>
  <rect x="780" y="258" width="74" height="20" rx="10" fill="rgba(239,68,68,0.12)"/>
  <circle cx="794" cy="268" r="3" fill="#ef4444"/>
  <text x="804" y="272" fill="#ef4444" font="700 10px Inter">STREAMING</text>
  <text class="text-mono" x="924" y="272" text-anchor="end">14 entries</text>
  <line x1="48" y1="292" x2="948" y2="292" stroke="rgba(148,163,184,0.1)"/>

  <!-- Log lines -->
  <g transform="translate(72,322)" font="500 12.5px 'JetBrains Mono', monospace">
