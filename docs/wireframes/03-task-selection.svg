<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <style>
      .bg { fill: #060a14; }
      .panel { fill: #0c1222; stroke: rgba(148,163,184,0.1); stroke-width: 1; }
      .panel-elev { fill: #141c2e; stroke: rgba(148,163,184,0.1); stroke-width: 1; }
      .text-h1 { fill: #f1f5f9; font: 800 36px Inter, sans-serif; letter-spacing: -1px; }
      .text-h2 { fill: #f1f5f9; font: 600 17px Inter, sans-serif; }
      .text-body { fill: #94a3b8; font: 400 13px Inter, sans-serif; }
      .text-mono { fill: #94a3b8; font: 500 11px 'JetBrains Mono', monospace; }
      .label { fill: #64748b; font: 600 11px Inter, sans-serif; letter-spacing: 0.5px; }
      .accent { fill: #6366f1; }
      .ghost { fill: #94a3b8; font: 500 13px Inter; }
    </style>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="1440" height="900"/>

  <!-- Header -->
  <rect class="panel" x="0" y="0" width="1440" height="68"/>
  <rect class="accent" x="48" y="20" width="32" height="32" rx="8"/>
  <text class="text-h2" x="92" y="36" style="font-size:15px">Agentic Portal</text>
  <text class="text-body" x="92" y="54" style="font-size:11px">AI-native developer platform</text>
  <text class="text-body" x="280" y="42">Repositories</text>
  <text fill="#64748b" x="365" y="42">/</text>
  <text fill="#94a3b8" font="500 13px Inter" x="378" y="42">developer-portal-ui</text>
  <text fill="#64748b" x="510" y="42">/</text>
  <text fill="#f1f5f9" font="500 13px Inter" x="522" y="42">Agent Execution</text>

  <!-- Back -->
  <text class="ghost" x="48" y="110">← Back to developer-portal-ui</text>

  <!-- Title -->
  <text class="text-h1" x="720" y="180" text-anchor="middle">Choose an <tspan fill="url(#brandGrad)">agent task</tspan></text>
  <text class="text-body" x="720" y="216" text-anchor="middle" style="font-size:14px">Dispatch an autonomous AI agent to operate on developer-portal-ui.</text>
  <text class="text-body" x="720" y="236" text-anchor="middle" style="font-size:14px">Each task runs with full visibility into reasoning steps and live logs.</text>

  <!-- Task grid 3x2 -->
  <g transform="translate(48,300)">
    <!-- Create PR -->
    <g>
      <rect class="panel" width="438" height="220" rx="16"/>
      <rect class="accent" x="24" y="24" width="56" height="56" rx="10" opacity="0.18"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="none" stroke="#6366f1" opacity="0.5"/>
      <text x="52" y="64" font="32px sans-serif" text-anchor="middle">🔀</text>
      <text class="text-h2" x="24" y="112">Create Pull Request</text>
      <text class="text-body" x="24" y="138" style="font-size:13px">Automatically generate a PR with code</text>
      <text class="text-body" x="24" y="156" style="font-size:13px">changes based on an issue or description.</text>
      <line x1="24" y1="180" x2="414" y2="180" stroke="rgba(148,163,184,0.1)"/>
      <text class="text-mono" x="24" y="200">⏱ 2-5 min</text>
      <text x="414" y="200" fill="#6366f1" font="600 12px Inter" text-anchor="end">Run agent →</text>
    </g>

    <!-- Refactor -->
    <g transform="translate(456,0)">
      <rect class="panel" width="438" height="220" rx="16"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="#8b5cf6" opacity="0.18"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="none" stroke="#8b5cf6" opacity="0.5"/>
      <text x="52" y="64" font="32px sans-serif" text-anchor="middle">🔧</text>
      <text class="text-h2" x="24" y="112">Refactor Code</text>
      <text class="text-body" x="24" y="138" style="font-size:13px">Analyze and refactor code for better</text>
      <text class="text-body" x="24" y="156" style="font-size:13px">performance, readability and maintainability.</text>
      <line x1="24" y1="180" x2="414" y2="180" stroke="rgba(148,163,184,0.1)"/>
      <text class="text-mono" x="24" y="200">⏱ 3-8 min</text>
      <text x="414" y="200" fill="#8b5cf6" font="600 12px Inter" text-anchor="end">Run agent →</text>
    </g>

    <!-- Run Tests -->
    <g transform="translate(912,0)">
      <rect class="panel" width="438" height="220" rx="16"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="#06b6d4" opacity="0.18"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="none" stroke="#06b6d4" opacity="0.5"/>
      <text x="52" y="64" font="32px sans-serif" text-anchor="middle">🧪</text>
      <text class="text-h2" x="24" y="112">Run Tests</text>
      <text class="text-body" x="24" y="138" style="font-size:13px">Execute the full test suite, identify</text>
      <text class="text-body" x="24" y="156" style="font-size:13px">failures, and suggest fixes for broken tests.</text>
      <line x1="24" y1="180" x2="414" y2="180" stroke="rgba(148,163,184,0.1)"/>
      <text class="text-mono" x="24" y="200">⏱ 1-3 min</text>
      <text x="414" y="200" fill="#06b6d4" font="600 12px Inter" text-anchor="end">Run agent →</text>
    </g>

    <!-- Security Scan -->
    <g transform="translate(0,240)">
      <rect class="panel" width="438" height="220" rx="16"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="#f59e0b" opacity="0.18"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="none" stroke="#f59e0b" opacity="0.5"/>
      <text x="52" y="64" font="32px sans-serif" text-anchor="middle">🛡️</text>
      <text class="text-h2" x="24" y="112">Security Scan</text>
      <text class="text-body" x="24" y="138" style="font-size:13px">Deep security audit scanning for</text>
      <text class="text-body" x="24" y="156" style="font-size:13px">vulnerabilities, exposed secrets, and risks.</text>
      <line x1="24" y1="180" x2="414" y2="180" stroke="rgba(148,163,184,0.1)"/>
      <text class="text-mono" x="24" y="200">⏱ 2-4 min</text>
      <text x="414" y="200" fill="#f59e0b" font="600 12px Inter" text-anchor="end">Run agent →</text>
    </g>

    <!-- Dependency Upgrade -->
    <g transform="translate(456,240)">
      <rect class="panel" width="438" height="220" rx="16"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="#10b981" opacity="0.18"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="none" stroke="#10b981" opacity="0.5"/>
      <text x="52" y="64" font="32px sans-serif" text-anchor="middle">📦</text>
      <text class="text-h2" x="24" y="112">Dependency Upgrade</text>
      <text class="text-body" x="24" y="138" style="font-size:13px">Analyze outdated dependencies, check</text>
      <text class="text-body" x="24" y="156" style="font-size:13px">compatibility, and create upgrade PRs.</text>
      <line x1="24" y1="180" x2="414" y2="180" stroke="rgba(148,163,184,0.1)"/>
      <text class="text-mono" x="24" y="200">⏱ 3-6 min</text>
      <text x="414" y="200" fill="#10b981" font="600 12px Inter" text-anchor="end">Run agent →</text>
    </g>

    <!-- Code Review -->
    <g transform="translate(912,240)">
      <rect class="panel" width="438" height="220" rx="16"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="#ec4899" opacity="0.18"/>
      <rect x="24" y="24" width="56" height="56" rx="10" fill="none" stroke="#ec4899" opacity="0.5"/>
      <text x="52" y="64" font="32px sans-serif" text-anchor="middle">👁️</text>
      <text class="text-h2" x="24" y="112">Code Review</text>
      <text class="text-body" x="24" y="138" style="font-size:13px">AI-powered code review with suggestions</text>
      <text class="text-body" x="24" y="156" style="font-size:13px">for improvements, bugs, and best practices.</text>
      <line x1="24" y1="180" x2="414" y2="180" stroke="rgba(148,163,184,0.1)"/>
      <text class="text-mono" x="24" y="200">⏱ 1-4 min</text>
      <text x="414" y="200" fill="#ec4899" font="600 12px Inter" text-anchor="end">Run agent →</text>
    </g>
  </g>

  <text class="text-body" x="48" y="860" style="font-size:11px;font-style:italic">Wireframe 3 of 4 — Agent Task Selection · Six task types presented as a card grid; each card shows icon, description, estimated duration, and a colored CTA.</text>
</svg>
